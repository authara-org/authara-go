name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@v0.41.0

      - name: Check goimports formatting
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          files=$(git ls-files '*.go' ':!**/*_templ.go')
          test -z "$(goimports -l $files)"

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

